<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SENTINEL – CCTV Violence Detection</title>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
text-align:center;
margin:0;
padding:0;
}

.container{
width:900px;
margin:auto;
padding:40px;
}

.card{
background:#121a2b;
padding:25px;
border-radius:12px;
margin-top:20px;
}

input,button{
padding:10px;
margin:8px;
border-radius:6px;
border:none;
}

button{
background:#ff4d4d;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ff2d2d;
}

video{
width:400px;
border-radius:10px;
margin-top:10px;
}

.dropzone{
border:2px dashed #444;
padding:40px;
margin-top:15px;
border-radius:10px;
cursor:pointer;
}

.dropzone:hover{
border-color:#ff4d4d;
}

.result{
background:#1a2337;
padding:15px;
margin-top:15px;
border-radius:8px;
}

.incident{
background:#1f2b46;
margin-top:10px;
padding:10px;
border-radius:8px;
display:flex;
align-items:center;
gap:10px;
}

.thumb{
width:120px;
border-radius:6px;
}

</style>

</head>


<body>

<div class="container">

<h1>🛡️ SENTINEL</h1>
<p>AI CCTV Violence Detection</p>

<div class="card">

<h3>Configuration</h3>

<input id="apiKey" placeholder="4qFODZroJozJG7IYmz19">

<input id="modelId" value="cctv-violence-detection/3">

<br>

<label>Frame Interval</label>
<input id="frameInterval" value="0.5">

<label>Confidence</label>
<input id="confidence" value="40">

<label>Cluster Gap</label>
<input id="clusterGap" value="2">

</div>



<div class="card">

<h3>Upload CCTV Footage</h3>

<div class="dropzone" id="dropzone">
Click or Drop CCTV Video Here
</div>

<input type="file" id="videoInput" accept="video/*" hidden>

<br>

<video id="preview" controls></video>

<br>

<button onclick="startAnalysis()">Analyze Footage</button>

</div>



<div class="card">

<h3>Results</h3>

<div id="stats"></div>

<div id="timeline"></div>

</div>

</div>



<script>

const $ = id => document.getElementById(id)

const videoInput = $("videoInput")
const preview = $("preview")
const dropzone = $("dropzone")

// CLICK upload
dropzone.onclick = () => videoInput.click()

// FILE SELECT
videoInput.onchange = e=>{
const file = e.target.files[0]
preview.src = URL.createObjectURL(file)
}

// DRAG DROP
dropzone.addEventListener("dragover",(e)=>{
e.preventDefault()
dropzone.style.borderColor="#ff4d4d"
})

dropzone.addEventListener("dragleave",()=>{
dropzone.style.borderColor="#444"
})

dropzone.addEventListener("drop",(e)=>{
e.preventDefault()

const file = e.dataTransfer.files[0]

videoInput.files = e.dataTransfer.files
preview.src = URL.createObjectURL(file)

dropzone.style.borderColor="#444"
})



async function startAnalysis(){

const file = videoInput.files[0]

if(!file){
alert("Upload video first")
return
}

const formData = new FormData()

formData.append("video",file)
formData.append("api_key",$("apiKey").value)
formData.append("model_id",$("modelId").value)
formData.append("frame_interval",$("frameInterval").value)
formData.append("confidence",$("confidence").value)
formData.append("cluster_gap",$("clusterGap").value)

$("stats").innerHTML="⏳ Analyzing video... please wait."

try{

const res = await fetch("/analyze",{
method:"POST",
body:formData
})

const data = await res.json()

renderResults(data)

}
catch(e){

$("stats").innerHTML="⚠ Backend not reachable. Wait 10 seconds and try again."

}

}



function renderResults(data){

$("stats").innerHTML=`

<div class="result">

Frames Processed: ${data.frames_processed}<br>
Violence Events: ${data.violence_count}<br>
Weapon Events: ${data.weapon_count}

</div>

`

const timeline = $("timeline")
timeline.innerHTML=""

data.incidents.forEach(i=>{

timeline.innerHTML += `

<div class="incident">

<img class="thumb" src="${i.thumbnail}">

<div>

<b>Time:</b> ${i.time}s<br>
<b>Class:</b> ${i.all_classes.join(", ")}<br>
<b>Confidence:</b> ${(i.max_confidence*100).toFixed(1)}%

</div>

</div>

`

})

}

</script>

</body>
</html>
